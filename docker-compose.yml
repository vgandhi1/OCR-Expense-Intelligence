services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/data/uploads
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_ROOT=/data/uploads
      - ADMIN_KEY=${ADMIN_KEY:-dev-admin-key}
      - REQUIRE_API_KEY=${REQUIRE_API_KEY:-0}
      # Share rate-limit counters across API replicas via Redis (db 1, separate from Celery).
      - RATELIMIT_STORAGE_URI=redis://redis:6379/1
    # Probe readiness (Mongo + Redis reachable). python urllib avoids needing curl
    # in the slim image; start_period covers first-boot model/dependency warmup.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - mongo
      - redis

  worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: celery -A celery_app worker -l INFO
    volumes:
      - ./backend:/app
      - upload_data:/data/uploads
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_ROOT=/data/uploads
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
  upload_data:
